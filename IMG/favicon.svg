<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">

<!-- Sfondo Carbon del Portfolio -->
  <rect width="500" height="500" fill="#0A0B0D"/>

<!-- INTERFACCIA CINEMATOGRAFICA (Dettagli Tecnici di Contorno) -->
<!-- Angoli del mirino (Camera Corners) -->
  <path d="M 40,65 V 40 H 65" fill="none" stroke="#EDEAE2" stroke-width="1.5" opacity="0.3"/>
  <path d="M 460,65 V 40 H 435" fill="none" stroke="#EDEAE2" stroke-width="1.5" opacity="0.3"/>
  <path d="M 40,435 V 460 H 65" fill="none" stroke="#EDEAE2" stroke-width="1.5" opacity="0.3"/>
  <path d="M 460,435 V 460 H 435" fill="none" stroke="#EDEAE2" stroke-width="1.5" opacity="0.3"/>

<!-- Assi di Inquadratura Centrali (Micro-tratteggi sui quattro lati) -->  <line x1="250" y1="25" x2="250" y2="35" stroke="#717A86" stroke-width="1" opacity="0.5"/>
  <line x1="250" y1="465" x2="250" y2="475" stroke="#717A86" stroke-width="1" opacity="0.5"/>
  <line x1="25" y1="250" x2="35" y2="250" stroke="#717A86" stroke-width="1" opacity="0.5"/>
  <line x1="465" y1="250" x2="475" y2="250" stroke="#717A86" stroke-width="1" opacity="0.5"/>

<!-- MONOGRAMMA CENTRALE -->
  <g id="monogram" transform="translate(0, 35)">
<!-- Lettera R (Elegante, Bold, fusa tra lo stile Display e Serif moderno) -->
    <text x="210" y="340" 
          font-family="'Big Shoulders Display', 'Helvetica Neue', sans-serif" 
          font-size="330" 
          font-weight="800" 
          fill="#EDEAE2" 
          text-anchor="middle" 
          letter-spacing="-4">R</text>
  
<!-- Il Punto "Tally" Cinematografico (Rosso Acceso) -->
    <circle cx="345" cy="305" r="22" fill="#FF3B30"/>
  </g>
</svg>